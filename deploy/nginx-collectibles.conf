# ─────────────────────────────────────────────────────────────
# nginx لخدمة المقتنيات + الـ WebApp  (Phase G)
# يقدّم ملفات الـ WebApp الثابتة، ويوجّه /api و /media للخدمة الداخلية.
# لا يُعرَّض /health و /metrics (يبقيان داخليَّين على 127.0.0.1:8100).
# HTTPS إلزامي لـ Telegram WebApp — استخدم certbot لإصدار الشهادة.
# ─────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;                     # ← نطاقك

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # ── الـ WebApp الثابت ──
    root /root/collectibles-service/webapp;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── واجهة الكتالوج العامة ──
    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── صور الوسائط المكاشة ──
    location /media/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ملاحظة: /health و /metrics غير معرَّفين هنا عمداً → لا يُعرَّضان للعامة.
}

# إعادة توجيه HTTP → HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}
